services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling_system}
      MYSQL_USER: ${MYSQL_USER:-scheduler}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-scheduler_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-scheduling_system}
      DB_USER: ${MYSQL_USER:-scheduler}
      DB_PASSWORD: ${MYSQL_PASSWORD:-scheduler_password}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SLOT_INTERVAL_MINUTES: ${SLOT_INTERVAL_MINUTES:-30}
      SEED_MODE: ${SEED_MODE:-true}
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  mysql_data:
